# =============================================================
# Cloud Run 自動デプロイ - mainブランチへのマージ時
# =============================================================
# 【必要なGitHub Secrets】
#    - GCP_PROJECT_ID:       GCPプロジェクトID
#    - GCP_SA_KEY:           サービスアカウントのJSONキー
#    - GCP_REGION:           asia-northeast1
#    - DATABASE_URL:         Cloud SQL接続用URL（Unix Socket形式）
#    - AUTH_SECRET:          Auth.js用シークレットキー
#    - CLOUD_SQL_CONNECTION: Cloud SQL接続名（project:region:instance）
#
# 【Secret Manager 移行手順】（任意）
#    USE_SECRET_MANAGER=true を環境変数に追加すると、DATABASE_URL/AUTH_SECRET を
#    Secret Manager から取得する。以下を事前に実行:
#    1. gcloud secrets create DATABASE_URL --replication-policy=automatic
#    2. echo -n "<値>" | gcloud secrets versions add DATABASE_URL --data-file=-
#    3. gcloud secrets create AUTH_SECRET --replication-policy=automatic
#    4. echo -n "<値>" | gcloud secrets versions add AUTH_SECRET --data-file=-
#    5. サービスアカウントに secretmanager.versions.access 権限を付与
#    6. deploy.yml の --set-env-vars から DATABASE_URL/AUTH_SECRET を削除し
#       USE_SECRET_MANAGER=true と GCP_PROJECT_ID を追加
# =============================================================

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: mieru-clinic
  REPOSITORY: mieru-clinic

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # --- 1. コード取得 ---
      - name: コード取得
        uses: actions/checkout@v4

      # --- 2. GCP認証 ---
      - name: GCP認証
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # --- 3. Google Cloud SDK セットアップ ---
      - name: gcloud セットアップ
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      # --- 4. Docker認証（Artifact Registry） ---
      - name: Docker認証
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # --- 5. Dockerイメージをビルド & プッシュ ---
      - name: Dockerイメージのビルド & プッシュ
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      # --- 6. Cloud Runにデプロイ ---
      - name: Cloud Runにデプロイ
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --service-account "cloud-run-mieru@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --add-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION }} \
            --vpc-connector "mieru-vpc-connector" \
            --vpc-egress "private-ranges-only" \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --set-env-vars "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
            --set-env-vars "AUTH_URL=https://mieru-clinic.com" \
            --set-env-vars "NEXT_PUBLIC_APP_URL=https://mieru-clinic.com" \
            --set-env-vars "RUN_MIGRATIONS=true" \
            --set-env-vars "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"

      # --- 7. ヘルスチェック ---
      - name: デプロイ後ヘルスチェック
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "::notice::デプロイ完了: $URL"
          echo "ヘルスチェック実行中..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" --max-time 10) || true
            if [ "$STATUS" = "200" ]; then
              echo "✅ ヘルスチェック成功 (attempt $i)"
              exit 0
            fi
            echo "⏳ ヘルスチェック待機中... (attempt $i, status=$STATUS)"
            sleep 10
          done
          echo "::error::❌ ヘルスチェック失敗 — デプロイを確認してください"
          exit 1
