# =============================================================
# CI - 型チェック / Lint / テスト
# =============================================================
# プルリクエストおよび main への push 時に自動実行。
# 失敗時は GitHub PR のチェック欄に赤バツが付き、マージブロックの判断材料になる。
# =============================================================

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Typecheck / Lint / Test
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存関係インストール
        run: npm ci

      - name: 型チェック
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: ユニットテスト
        run: npm test
